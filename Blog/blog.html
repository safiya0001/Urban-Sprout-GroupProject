/* BLOG */
.container {
    width: 80%;
    min-height: 88vh; /* sweet spot for the content to fill the browser height */
    margin: 30px auto;
}

h1 {
    text-align: center;
}

.blog-card {
    display: flex;
    background: white;
    padding: 20px;
    margin: 30px 0;
    border-radius: 10px;
    transition: 0.3s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.blog-card:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.blog-img {
    width: 180px;
    height: 120px;
    margin-right: 20px;
}

.blog-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
}

.blog-btn {
    padding: 8px 15px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.blog-btn:hover {
    background: darkgreen;
}
</style>
