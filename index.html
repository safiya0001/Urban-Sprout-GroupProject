        .container {
        width: 80%;
        margin: 20px auto;
        padding: 15px;
        }

        /* CATEGORIES */
        .categories {
        display: flex;
        justify-content: space-around;
        text-align: center;
        }

        .category {
        color: black;
        }

        .cat-box {
        width: 75px;
        height: 75px;
        border: 2px solid #555;
        margin: 10px auto;
        border-radius: 6px;
        overflow: hidden;
        }

        .cat-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        }

        /* BANNER */
        .banner {
        height: 150px;
        background: #ccc;
        margin: 20px 0;
        border-radius: 6px;
        }

        /* VISION */
        .vision-box {
        height: 120px;
        background: #ccc;
        margin-top: 10px;
        border-radius: 6px;
        }

        /* PRODUCTS */
        .product-grid {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 20px;
        }

        .product {
        width: 300px; 
        height: 180px;
        /* height: 150px;    */
        padding: 20px;
        text-align: center;
        border-radius: 8px;
        transition: 0.3s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product:hover {
        transform: translateY(-10px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        background: #e8f5e9;
        }

        .product-img {
        width: 100%;
        height: 150px;
        background: #bbb;
        margin-bottom: 10px;
        border-radius: 5px;
        }

        /* BUTTON */
        .product button {
        padding: 6px 10px;
        border: none;
        background: #2e7d32;
        color: white;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        }

        .product button:hover {
        background: #1b5e20;
        }

        /* FOOTER */
        .footer {
        text-align: center;
        font-size: 12px;
        padding: 10px;
        border-top: 1px solid #999;
        margin-top: 30px;
        }
    </style>
