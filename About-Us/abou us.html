<!DOCTYPE html>
<html>
<head>
    <title>Our Team</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        .team {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        .member {
            text-align: center;
            transition: 0.3s;
        }

        /* Profile Image */
        .member img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
        }

        /* Hover Effect */
        .member:hover {
            transform: scale(1.1);
        }

        .role {
            color: gray;
        }

        button {
            margin-top: 5px;
            padding: 5px 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<h2>Meet Our Team</h2>

<div class="team">

    <div class="member">
        <img src="https://via.placeholder.com/150">
        <h3>Safiya</h3>
        <p class="role">Designer</p>
        <button onclick="showInfo('Safiya')">View</button>
    </div>

    <div class="member">
        <img src="https://via.placeholder.com/150">
        <h3>Member 2</h3>
        <p class="role">Developer</p>
        <button onclick="showInfo('Member 2')">View</button>
    </div>

    <div class="member">
        <img src="https://via.placeholder.com/150">
        <h3>Member 3</h3>
        <p class="role">Researcher</p>
        <button onclick="showInfo('Member 3')">View</button>
    </div>

</div>

<script>
function showInfo(name) {
    alert(name + " is part of our team!");
}
</script>

</body>
</html>
